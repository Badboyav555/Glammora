<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>My Profile - Glammora</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0f0f12;
            --bg-card: #1a1a22;
            --pink-primary: #d81b60;
            --pink-accent: #ff4d8d;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --gradient-primary: linear-gradient(135deg, #d81b60, #ff4d8d);
            --shadow-pink: 0 8px 32px rgba(216, 27, 96, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 16px 16px 100px;
            max-width: 500px;
            margin: 0 auto;
        }

        .profile-header {
            text-align: center;
            padding: 20px 0;
        }
        .profile-avatar {
            width: 70px; height: 70px; border-radius: 50%;
            background: var(--gradient-primary);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 10px; font-size: 1.8rem; font-weight: 700;
        }
        .profile-name { font-size: 1.2rem; font-weight: 700; }
        .profile-phone { color: var(--text-secondary); font-size: 0.9rem; }

        .tabs {
            display: flex; gap: 6px; overflow-x: auto; padding: 12px 0;
            scrollbar-width: none; position: sticky; top: 0;
            background: var(--bg-primary); z-index: 10;
        }
        .tab {
            padding: 10px 16px; background: var(--bg-card); border: none;
            color: var(--text-secondary); border-radius: 50px; cursor: pointer;
            white-space: nowrap; font-size: 0.82rem; font-weight: 600;
        }
        .tab.active { background: var(--pink-primary); color: white; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card {
            background: var(--bg-card); border-radius: 14px;
            padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.06);
        }
        .card h4 { color: var(--pink-accent); margin-bottom: 12px; font-size: 0.95rem; }

        input, select, textarea {
            width: 100%; padding: 10px 12px; background: #0f0f12;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            color: white; font-size: 0.85rem; margin-bottom: 8px;
            font-family: inherit; outline: none;
        }
        input:focus, select:focus { border-color: var(--pink-primary); }
        label { font-size: 0.78rem; color: var(--text-secondary); display: block; margin-bottom: 4px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        .btn {
            background: var(--gradient-primary); color: white; border: none;
            padding: 12px 20px; border-radius: 50px; cursor: pointer;
            font-weight: 600; font-size: 0.9rem; width: 100%; margin-top: 8px;
        }
        .btn-outline {
            background: transparent; border: 2px solid var(--pink-primary);
            color: var(--pink-accent); padding: 10px 20px; border-radius: 50px;
            cursor: pointer; font-weight: 600; font-size: 0.85rem; width: 100%;
        }
        .btn-red {
            background: transparent; border: 2px solid #f44336;
            color: #f44336; padding: 12px; border-radius: 50px;
            cursor: pointer; font-weight: 600; width: 100%; margin-top: 16px;
        }

        .order-card {
            background: #0f0f12; border-radius: 12px; padding: 14px; margin-bottom: 10px;
        }
        .order-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px;
        }
        .order-id { font-weight: 600; font-size: 0.85rem; }
        .order-date { font-size: 0.75rem; color: var(--text-secondary); }
        .status {
            padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600;
            text-transform: uppercase;
        }
        .status-pending { background: rgba(255,193,7,0.2); color: #ffc107; }
        .status-delivered { background: rgba(76,175,80,0.2); color: #4caf50; }
        .status-cancelled { background: rgba(244,67,54,0.2); color: #f44336; }
        .status-shipped { background: rgba(33,150,243,0.2); color: #2196f3; }

        .order-items { display: flex; gap: 6px; margin: 8px 0; overflow-x: auto; }
        .order-item-img { width: 45px; height: 60px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
        .order-total { font-weight: 700; color: var(--pink-accent); text-align: right; }

        .stat-box {
            background: #0f0f12; padding: 16px; border-radius: 10px; text-align: center;
        }
        .stat-value { font-size: 1.4rem; font-weight: 700; color: var(--pink-accent); }
        .stat-label { font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px; }

        .referral-link-box {
            display: flex; gap: 8px; margin: 10px 0;
        }
        .referral-link-box input {
            flex: 1; padding: 10px; background: #0f0f12;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            color: white; font-size: 0.8rem;
        }

        .address-card {
            background: #0f0f12; padding: 12px; border-radius: 10px;
            margin-bottom: 8px; position: relative;
        }
        .address-type {
            position: absolute; top: 8px; right: 8px;
            background: rgba(216,27,96,0.2); color: var(--pink-accent);
            padding: 2px 8px; border-radius: 20px; font-size: 0.65rem; font-weight: 600;
        }

        .wishlist-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .wishlist-item {
            background: #0f0f12; border-radius: 12px; overflow: hidden;
            position: relative; cursor: pointer;
        }
        .wishlist-item img { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
        .wishlist-item .info { padding: 8px; }
        .wishlist-item .name { font-size: 0.8rem; font-weight: 600; }
        .wishlist-item .price { color: var(--pink-accent); font-weight: 700; font-size: 0.85rem; }
        .remove-wishlist {
            position: absolute; top: 6px; right: 6px;
            background: rgba(244,67,54,0.8); color: white; border: none;
            width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
            font-size: 0.8rem;
        }

        .msg { padding: 10px; border-radius: 8px; margin-top: 8px; font-size: 0.85rem; }
        .msg-success { background: rgba(76,175,80,0.15); color: #4caf50; }
        .msg-error { background: rgba(244,67,54,0.15); color: #f44336; }

        @media (max-width: 360px) {
            .form-row { grid-template-columns: 1fr; }
            .wishlist-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div style="display:flex;align-items:center;gap:12px;padding:8px 0 16px;">
        <button onclick="window.location.href='index.html'" style="background:#1a1a22;border:1px solid rgba(255,255,255,0.1);color:white;width:40px;height:40px;border-radius:50%;font-size:1.1rem;cursor:pointer;">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h2 style="font-size:1.2rem;font-weight:700;">My Profile</h2>
    </div>
    <div class="profile-header">
        <div class="profile-avatar" id="profileAvatar">U</div>
        <h2 class="profile-name" id="profileName">User</h2>
        <p class="profile-phone" id="profilePhone">+91 ----------</p>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('orders')">Orders</button>
        <button class="tab" onclick="switchTab('referral')">Refer & Earn</button>
        <button class="tab" onclick="switchTab('wishlist')">Wishlist</button>
        <button class="tab" onclick="switchTab('addresses')">Addresses</button>
        <button class="tab" onclick="switchTab('profile')">Profile</button>
    </div>

    <!-- Orders Tab -->
    <div class="tab-content active" id="ordersTab">
        <div id="ordersList"><p style="color:var(--text-secondary);text-align:center;padding:40px;">Loading...</p></div>
    </div>

    <!-- Referral Tab -->
    <div class="tab-content" id="referralTab">
        <div class="card">
            <h4>Refer & Earn</h4>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
                <div class="stat-box">
                    <div class="stat-value" id="totalEarnings">Rs. 0</div>
                    <div class="stat-label">Total Earnings</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="referralCount">0</div>
                    <div class="stat-label">Referred Orders</div>
                </div>
            </div>
            <label>Your Referral Link</label>
            <div class="referral-link-box">
                <input type="text" id="referralLink" readonly>
                <button class="btn" style="width:auto;margin:0;padding:10px 16px;" onclick="copyReferral()">Copy</button>
            </div>
            <button class="btn-outline" onclick="shareWhatsApp()">Share on WhatsApp</button>
        </div>
    </div>

    <!-- Wishlist Tab -->
    <div class="tab-content" id="wishlistTab">
        <div class="wishlist-grid" id="wishlistGrid"></div>
    </div>

    <!-- Addresses Tab -->
    <div class="tab-content" id="addressesTab">
        <div id="addressesList"></div>
        <button class="btn" onclick="showAddressForm()">+ Add New Address</button>
        
        <div class="card" id="addressFormCard" style="display:none;">
            <h4 id="addressFormTitle">Add Address</h4>
            <input type="hidden" id="addressId">
            <label>Full Name *</label>
            <input type="text" id="addrName" placeholder="Full name" required>
            <label>Phone *</label>
            <input type="tel" id="addrPhone" placeholder="10-digit number" maxlength="10" required>
            <label>Alternate Phone</label>
            <input type="tel" id="addrAltPhone" placeholder="Optional" maxlength="10">
            <label>House/Flat/Building *</label>
            <input type="text" id="addrAddress" placeholder="House no., building" required>
            <label>Area/Street *</label>
            <input type="text" id="addrArea" placeholder="Area or street" required>
            <label>Landmark</label>
            <input type="text" id="addrLandmark" placeholder="Nearby landmark">
            <div class="form-row">
                <div><label>City *</label><input type="text" id="addrCity" required></div>
                <div><label>State *</label>
                    <select id="addrState" required>
                        <option value="">Select</option>
                        <option>Andhra Pradesh</option><option>Assam</option><option>Bihar</option>
                        <option>Chhattisgarh</option><option>Delhi</option><option>Goa</option>
                        <option>Gujarat</option><option>Haryana</option><option>Himachal Pradesh</option>
                        <option>Jharkhand</option><option>Karnataka</option><option>Kerala</option>
                        <option>Madhya Pradesh</option><option>Maharashtra</option><option>Odisha</option>
                        <option>Punjab</option><option>Rajasthan</option><option>Tamil Nadu</option>
                        <option>Telangana</option><option>Uttar Pradesh</option><option>Uttarakhand</option>
                        <option>West Bengal</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div><label>Pincode *</label><input type="text" id="addrPincode" maxlength="6" required></div>
                <div><label>Country</label><input type="text" value="India" readonly></div>
            </div>
            <div style="display:flex;gap:8px;margin-top:8px;">
                <button class="btn" onclick="saveAddress()">Save Address</button>
                <button class="btn-outline" onclick="document.getElementById('addressFormCard').style.display='none'">Cancel</button>
            </div>
            <div id="addressMsg"></div>
        </div>
    </div>

    <!-- Profile Tab -->
    <div class="tab-content" id="profileTab">
        <div class="card">
            <h4>Edit Profile</h4>
            <label>Full Name</label>
            <input type="text" id="editName" placeholder="Your name">
            <label>Phone</label>
            <input type="tel" id="editPhone" placeholder="Phone" readonly style="opacity:0.6;">
            <label>New Password (leave blank to keep current)</label>
            <input type="password" id="editPassword" placeholder="New password (min 6 chars)">
            <button class="btn" onclick="updateProfile()">Update Profile</button>
            <div id="profileMsg"></div>
        </div>
        <button class="btn-red" onclick="logout()">Logout</button>
    </div>

    <div id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        var user = JSON.parse(localStorage.getItem('glammora_user') || 'null');
        if (!user) { window.location.href = 'login.html'; }

        function showToast(msg, type) {
            var t = document.createElement('div');
            t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:' + (type === 'error' ? '#f44336dd' : '#1a1a22') + ';color:white;padding:12px 24px;border-radius:50px;z-index:200;font-size:0.85rem;border:1px solid ' + (type === 'error' ? '#f44336' : '#d81b60') + ';';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(function() { t.remove(); }, 2500);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
            document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
            
            var tabs = document.querySelectorAll('.tab');
            if (tab === 'orders') tabs[0].classList.add('active');
            if (tab === 'referral') tabs[1].classList.add('active');
            if (tab === 'wishlist') tabs[2].classList.add('active');
            if (tab === 'addresses') tabs[3].classList.add('active');
            if (tab === 'profile') tabs[4].classList.add('active');
            
            document.getElementById(tab + 'Tab').classList.add('active');
            
            if (tab === 'orders') loadOrders();
            if (tab === 'referral') loadReferral();
            if (tab === 'wishlist') loadWishlist();
            if (tab === 'addresses') loadAddresses();
            if (tab === 'profile') loadProfileData();
        }

        // ============ LOAD USER INFO ============
        async function loadUserInfo() {
            var res = await supabase.from('users').select('*').eq('id', user.id).single();
            if (res.data) {
                user = res.data;
                localStorage.setItem('glammora_user', JSON.stringify(user));
                document.getElementById('profileAvatar').textContent = (user.full_name || 'U')[0].toUpperCase();
                document.getElementById('profileName').textContent = user.full_name || 'User';
                document.getElementById('profilePhone').textContent = user.phone || '';
            }
        }
        loadUserInfo();

        // ============ ORDERS ============
        async function loadOrders() {
            var res = await supabase.from('orders').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
            var orders = res.data || [];
            var html = '';
            
            if (orders.length === 0) {
                html = '<p style="text-align:center;color:var(--text-secondary);padding:40px;">No orders yet</p>';
            } else {
                orders.forEach(function(o) {
                    var addr = o.full_address || {};
                    var statusClass = 'status-pending';
                    if (o.status === 'Delivered') statusClass = 'status-delivered';
                    if (o.status === 'Cancelled') statusClass = 'status-cancelled';
                    if (o.status === 'Shipped') statusClass = 'status-shipped';
                    
                    html += '<div class="order-card">';
                    html += '<div class="order-header"><span class="order-id">#' + String(o.id).slice(-6) + '</span><span class="order-date">' + new Date(o.created_at).toLocaleDateString() + '</span></div>';
                    html += '<div class="order-items">';
                    (o.items || []).forEach(function(item) {
                        var img = (item.images && item.images.length > 0) ? item.images[0] : 'https://via.placeholder.com/45x60';
                        html += '<img src="' + img + '" class="order-item-img" onerror="this.src=\'https://via.placeholder.com/45x60\'">';
                    });
                    html += '</div>';
                    html += '<div style="display:flex;justify-content:space-between;align-items:center;">';
                    html += '<span class="status ' + statusClass + '">' + o.status + '</span>';
                    html += '<span class="order-total">Rs. ' + (o.total_amount || 0).toLocaleString() + '</span>';
                    html += '</div>';
                    html += '<p style="font-size:0.75rem;color:var(--text-secondary);margin-top:6px;">' + (addr.fullName || '') + ', ' + (addr.address || '') + ', ' + (addr.city || '') + ' - ' + (addr.pincode || '') + '</p>';
                    html += '</div>';
                });
            }
            document.getElementById('ordersList').innerHTML = html;
        }

        // ============ REFERRAL ============
        async function loadReferral() {
            var res = await supabase.from('users').select('total_earnings, referral_count, referral_code').eq('id', user.id).single();
            if (res.data) {
                document.getElementById('totalEarnings').textContent = 'Rs. ' + (res.data.total_earnings || 0).toLocaleString();
                document.getElementById('referralCount').textContent = res.data.referral_count || 0;
                document.getElementById('referralLink').value = window.location.origin + '/?ref=' + res.data.referral_code;
            }
        }

        function copyReferral() {
            var link = document.getElementById('referralLink');
            link.select();
            navigator.clipboard.writeText(link.value).then(function() { showToast('Copied!'); });
        }

        function shareWhatsApp() {
            var link = document.getElementById('referralLink').value;
            window.open('https://wa.me/?text=' + encodeURIComponent('Join Glammora! Use my link: ' + link), '_blank');
        }

        // ============ WISHLIST ============
        async function loadWishlist() {
            var res = await supabase.from('wishlist').select('product_id').eq('user_id', user.id);
            var wishlist = res.data || [];
            var html = '';
            
            if (wishlist.length === 0) {
                html = '<p style="text-align:center;color:var(--text-secondary);grid-column:1/-1;padding:40px;">No items in wishlist</p>';
            } else {
                var productIds = wishlist.map(function(w) { return w.product_id; });
                var prodRes = await supabase.from('products').select('*').in('id', productIds);
                var products = prodRes.data || [];
                
                products.forEach(function(p) {
                    var img = (p.images && p.images.length > 0) ? p.images[0] : 'https://via.placeholder.com/200x250';
                    html += '<div class="wishlist-item" onclick="window.location.href=\'product.html?id=' + p.id + '\'">';
                    html += '<img src="' + img + '" onerror="this.src=\'https://via.placeholder.com/200x250\'">';
                    html += '<button class="remove-wishlist" onclick="event.stopPropagation();removeWishlist(' + p.id + ')">&times;</button>';
                    html += '<div class="info"><div class="name">' + p.name + '</div><div class="price">Rs. ' + (p.discounted_price || 0).toLocaleString() + '</div></div>';
                    html += '</div>';
                });
            }
            document.getElementById('wishlistGrid').innerHTML = html;
        }

        async function removeWishlist(productId) {
            await supabase.from('wishlist').delete().eq('user_id', user.id).eq('product_id', productId);
            showToast('Removed from wishlist');
            loadWishlist();
        }

        // ============ ADDRESSES ============
        async function loadAddresses() {
            var res = await supabase.from('addresses').select('*').eq('user_id', user.id).order('is_default', { ascending: false });
            var addresses = res.data || [];
            var html = '';
            
            if (addresses.length === 0) {
                html = '<p style="text-align:center;color:var(--text-secondary);padding:20px;">No saved addresses</p>';
            } else {
                addresses.forEach(function(a) {
                    html += '<div class="address-card">';
                    if (a.is_default) html += '<span class="address-type">Default</span>';
                    html += '<p style="font-weight:600;">' + a.full_name + ' - ' + a.phone + '</p>';
                    if (a.alternate_phone) html += '<p style="font-size:0.8rem;color:var(--text-secondary);">Alt: ' + a.alternate_phone + '</p>';
                    html += '<p style="font-size:0.85rem;">' + a.address + ', ' + a.area + '</p>';
                    if (a.landmark) html += '<p style="font-size:0.8rem;color:var(--text-secondary);">Landmark: ' + a.landmark + '</p>';
                    html += '<p style="font-size:0.85rem;">' + a.city + ', ' + a.state + ' - ' + a.pincode + '</p>';
                    html += '<div style="margin-top:8px;display:flex;gap:6px;">';
                    html += '<button class="btn-outline" style="padding:6px 12px;font-size:0.75rem;" onclick="editAddress(' + a.id + ')">Edit</button>';
                    html += '<button class="btn-outline" style="padding:6px 12px;font-size:0.75rem;border-color:#f44336;color:#f44336;" onclick="deleteAddress(' + a.id + ')">Delete</button>';
                    html += '</div></div>';
                });
            }
            document.getElementById('addressesList').innerHTML = html;
        }

        function showAddressForm() {
            document.getElementById('addressFormCard').style.display = 'block';
            document.getElementById('addressFormTitle').textContent = 'Add Address';
            document.getElementById('addressId').value = '';
            document.getElementById('addrName').value = '';
            document.getElementById('addrPhone').value = '';
            document.getElementById('addrAltPhone').value = '';
            document.getElementById('addrAddress').value = '';
            document.getElementById('addrArea').value = '';
            document.getElementById('addrLandmark').value = '';
            document.getElementById('addrCity').value = '';
            document.getElementById('addrState').value = '';
            document.getElementById('addrPincode').value = '';
            document.getElementById('addressMsg').innerHTML = '';
        }

        async function editAddress(id) {
            var res = await supabase.from('addresses').select('*').eq('id', id).single();
            if (!res.data) return;
            var a = res.data;
            document.getElementById('addressFormCard').style.display = 'block';
            document.getElementById('addressFormTitle').textContent = 'Edit Address';
            document.getElementById('addressId').value = a.id;
            document.getElementById('addrName').value = a.full_name || '';
            document.getElementById('addrPhone').value = a.phone || '';
            document.getElementById('addrAltPhone').value = a.alternate_phone || '';
            document.getElementById('addrAddress').value = a.address || '';
            document.getElementById('addrArea').value = a.area || '';
            document.getElementById('addrLandmark').value = a.landmark || '';
            document.getElementById('addrCity').value = a.city || '';
            document.getElementById('addrState').value = a.state || '';
            document.getElementById('addrPincode').value = a.pincode || '';
            document.getElementById('addressMsg').innerHTML = '';
        }

        async function saveAddress() {
            var id = document.getElementById('addressId').value;
            var data = {
                user_id: user.id,
                full_name: document.getElementById('addrName').value.trim(),
                phone: document.getElementById('addrPhone').value.trim(),
                alternate_phone: document.getElementById('addrAltPhone').value.trim(),
                address: document.getElementById('addrAddress').value.trim(),
                area: document.getElementById('addrArea').value.trim(),
                landmark: document.getElementById('addrLandmark').value.trim(),
                city: document.getElementById('addrCity').value.trim(),
                state: document.getElementById('addrState').value,
                pincode: document.getElementById('addrPincode').value.trim(),
                country: 'India',
                is_default: true
            };

            if (!data.full_name || !data.phone || !data.address || !data.area || !data.city || !data.state || !data.pincode) {
                document.getElementById('addressMsg').innerHTML = '<div class="msg msg-error">Fill all required fields</div>';
                return;
            }

            var result;
            if (id) {
                result = await supabase.from('addresses').update(data).eq('id', id);
            } else {
                result = await supabase.from('addresses').insert(data);
            }

            if (result.error) {
                document.getElementById('addressMsg').innerHTML = '<div class="msg msg-error">Failed: ' + result.error.message + '</div>';
            } else {
                document.getElementById('addressMsg').innerHTML = '<div class="msg msg-success">Address saved!</div>';
                document.getElementById('addressFormCard').style.display = 'none';
                loadAddresses();
            }
        }

        async function deleteAddress(id) {
            if (!confirm('Delete this address?')) return;
            await supabase.from('addresses').delete().eq('id', id);
            showToast('Address deleted');
            loadAddresses();
        }

        // ============ PROFILE ============
        function loadProfileData() {
            document.getElementById('editName').value = user.full_name || '';
            document.getElementById('editPhone').value = user.phone || '';
        }

        async function updateProfile() {
            var name = document.getElementById('editName').value.trim();
            var pass = document.getElementById('editPassword').value;
            var updates = { full_name: name };
            
            if (pass && pass.length >= 6) {
                updates.password = btoa(pass);
            } else if (pass && pass.length < 6) {
                document.getElementById('profileMsg').innerHTML = '<div class="msg msg-error">Password must be at least 6 characters</div>';
                return;
            }
            
            var res = await supabase.from('users').update(updates).eq('id', user.id);
            if (res.error) {
                document.getElementById('profileMsg').innerHTML = '<div class="msg msg-error">Failed to update</div>';
            } else {
                document.getElementById('profileMsg').innerHTML = '<div class="msg msg-success">Profile updated!</div>';
                loadUserInfo();
            }
        }

        function logout() {
            if (confirm('Logout?')) {
                localStorage.removeItem('glammora_user');
                localStorage.removeItem('glammora_cart');
                window.location.href = 'index.html';
            }
        }

        // Load orders on start
        loadOrders();
    </script>
</body>
</html>
