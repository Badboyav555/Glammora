<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Login - Glammora</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #0f0f12 0%, #1a1a2e 100%);
        }
        
        .auth-container {
            width: 100%;
            max-width: 420px;
        }
        
        .auth-logo {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .auth-logo h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .auth-logo p {
            color: var(--text-secondary);
            margin-top: 8px;
        }
        
        .auth-card {
            background: var(--gradient-card);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            border: var(--border-glass);
            padding: 32px 24px;
        }
        
        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
        }
        
        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: var(--transition);
        }
        
        .auth-tab.active {
            color: var(--pink-accent);
            border-bottom-color: var(--pink-primary);
        }
        
        .auth-form {
            display: none;
        }
        
        .auth-form.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--bg-card);
            border-radius: var(--radius-md);
            border: 2px solid rgba(255,255,255,0.1);
            transition: var(--transition);
            overflow: hidden;
        }
        
        .input-wrapper:focus-within {
            border-color: var(--pink-primary);
            box-shadow: 0 0 0 3px rgba(216, 27, 96, 0.1);
        }
        
        .input-wrapper .prefix {
            padding: 0 12px;
            color: var(--text-secondary);
            font-weight: 600;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        
        .input-wrapper input {
            flex: 1;
            padding: 14px 16px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
        }
        
        .input-wrapper input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        
        .password-toggle {
            padding: 0 16px;
            cursor: pointer;
            color: var(--text-secondary);
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--gradient-primary);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: var(--shadow-pink);
            transition: var(--transition);
            margin-top: 8px;
        }
        
        .submit-btn:active {
            transform: scale(0.96);
        }
        
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        
        .social-login {
            display: flex;
            gap: 12px;
        }
        
        .social-btn {
            flex: 1;
            padding: 12px;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 500;
        }
        
        .social-btn:hover {
            background: rgba(255,255,255,0.05);
        }
        
        .error-message {
            color: #ff4444;
            font-size: 0.85rem;
            margin-top: 8px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .success-message {
            color: #4caf50;
            font-size: 0.85rem;
            margin-top: 8px;
            display: none;
            text-align: center;
        }
        
        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <!-- Logo -->
            <div class="auth-logo">
                <h1>GLAMMORA.</h1>
                <p>Premium Fashion Destination</p>
            </div>

            <!-- Auth Card -->
            <div class="auth-card">
                <!-- Tabs -->
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchTab('login')">Login</button>
                    <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
                </div>

                <!-- Login Form -->
                <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Mobile Number</label>
                        <div class="input-wrapper">
                            <span class="prefix">+91</span>
                            <input type="tel" id="loginPhone" placeholder="Enter mobile number" maxlength="10" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="loginPassword" placeholder="Enter password" required>
                            <span class="password-toggle" onclick="togglePassword('loginPassword', this)">
                                <i class="fas fa-eye-slash"></i>
                            </span>
                        </div>
                    </div>
                    
                    <div class="error-message" id="loginError"></div>
                    
                    <button type="submit" class="submit-btn" id="loginSubmitBtn">
                        <span>Login</span>
                        <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
                    </button>
                    
                    <p style="text-align: center; margin-top: 16px; color: var(--text-secondary); font-size: 0.85rem;">
                        By continuing, you agree to our 
                        <a href="#" style="color: var(--pink-accent);">Terms</a> & 
                        <a href="#" style="color: var(--pink-accent);">Privacy Policy</a>
                    </p>
                </form>

                <!-- Signup Form -->
                <form class="auth-form" id="signupForm" onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label>Mobile Number</label>
                        <div class="input-wrapper">
                            <span class="prefix">+91</span>
                            <input type="tel" id="signupPhone" placeholder="Enter mobile number" maxlength="10" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Create Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="signupPassword" placeholder="Minimum 6 characters" required minlength="6">
                            <span class="password-toggle" onclick="togglePassword('signupPassword', this)">
                                <i class="fas fa-eye-slash"></i>
                            </span>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="signupConfirmPassword" placeholder="Re-enter password" required>
                            <span class="password-toggle" onclick="togglePassword('signupConfirmPassword', this)">
                                <i class="fas fa-eye-slash"></i>
                            </span>
                        </div>
                    </div>
                    
                    <div class="error-message" id="signupError"></div>
                    <div class="success-message" id="signupSuccess"></div>
                    
                    <button type="submit" class="submit-btn" id="signupSubmitBtn">
                        <span>Create Account</span>
                        <i class="fas fa-user-plus" style="margin-left: 8px;"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Login Page Script
document.addEventListener('DOMContentLoaded', function() {
    // Check if already logged in
    if (isLoggedIn()) {
        window.location.href = 'index.html';
        return;
    }
    
    // Focus phone input
    document.getElementById('loginPhone').focus();
});

function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    document.querySelectorAll('.error-message').forEach(el => { el.textContent = ''; el.classList.remove('show'); });
    document.querySelectorAll('.success-message').forEach(el => { el.textContent = ''; el.classList.remove('show'); });
    
    if (tab === 'login') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('loginForm').classList.add('active');
        document.getElementById('loginPhone').focus();
    } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('signupForm').classList.add('active');
        document.getElementById('signupPhone').focus();
    }
}

function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye';
    } else {
        input.type = 'password';
        icon.className = 'fas fa-eye-slash';
    }
}

// Login Handler
async function handleLogin(event) {
    event.preventDefault();
    
    const phone = document.getElementById('loginPhone').value.trim();
    const password = document.getElementById('loginPassword').value;
    const submitBtn = document.getElementById('loginSubmitBtn');
    const errorEl = document.getElementById('loginError');
    
    // Reset error
    errorEl.textContent = '';
    errorEl.classList.remove('show');
    
    // Validate
    if (!phone || phone.length !== 10 || !/^\d+$/.test(phone)) {
        errorEl.textContent = 'Enter valid 10-digit mobile number';
        errorEl.classList.add('show');
        return;
    }
    if (!password || password.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters';
        errorEl.classList.add('show');
        return;
    }
    
    // Show loading
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
    
    // Call auth
    const result = await CustomAuth.signIn(phone, password);
    
    if (result.success) {
        // Success
        submitBtn.innerHTML = '<i class="fas fa-check"></i> Success!';
        
        const urlParams = new URLSearchParams(window.location.search);
        const redirect = urlParams.get('redirect') || 'index.html';
        
        setTimeout(() => {
            window.location.href = redirect;
        }, 800);
    } else {
        // Error
        errorEl.textContent = result.error;
        errorEl.classList.add('show');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span>Login</span><i class="fas fa-arrow-right" style="margin-left:8px;"></i>';
    }
}

// Signup Handler
async function handleSignup(event) {
    event.preventDefault();
    
    const phone = document.getElementById('signupPhone').value.trim();
    const password = document.getElementById('signupPassword').value;
    const confirmPassword = document.getElementById('signupConfirmPassword').value;
    const submitBtn = document.getElementById('signupSubmitBtn');
    const errorEl = document.getElementById('signupError');
    const successEl = document.getElementById('signupSuccess');
    
    // Reset messages
    errorEl.textContent = '';
    errorEl.classList.remove('show');
    successEl.textContent = '';
    successEl.classList.remove('show');
    
    // Validate
    if (!phone || phone.length !== 10 || !/^\d+$/.test(phone)) {
        errorEl.textContent = 'Enter valid 10-digit mobile number';
        errorEl.classList.add('show');
        return;
    }
    if (!password || password.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters';
        errorEl.classList.add('show');
        return;
    }
    if (password !== confirmPassword) {
        errorEl.textContent = 'Passwords do not match';
        errorEl.classList.add('show');
        return;
    }
    
    // Show loading
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
    
    // Call auth
    const result = await CustomAuth.signUp(phone, password);
    
    if (result.success) {
        // Success
        successEl.textContent = 'Account created! Redirecting...';
        successEl.classList.add('show');
        submitBtn.innerHTML = '<i class="fas fa-check"></i> Created!';
        
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 1000);
    } else {
        // Error
        errorEl.textContent = result.error;
        errorEl.classList.add('show');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span>Create Account</span><i class="fas fa-user-plus" style="margin-left:8px;"></i>';
    }
}

// Toast
function showToast(msg) {
    const container = document.getElementById('toastContainer');
    if (!container) return;
    const toast = document.createElement('div');
    toast.style.cssText = 'background:#1f1f26;color:white;padding:14px 24px;border-radius:50px;text-align:center;margin-bottom:8px;border:1px solid #d81b60;animation:slideUp 0.3s ease;';
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}
