<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Glammora - Premium Fashion</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <h1>GLAMMORA</h1>
                <span class="logo-dot">.</span>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="searchBtn">
                    <i class="fas fa-search"></i>
                </button>
                <button class="icon-btn" id="wishlistBtn" onclick="window.location.href='profile.html#wishlist'">
                    <i class="fas fa-heart"></i>
                    <span class="badge wishlist-count">0</span>
                </button>
                <button class="icon-btn" id="cartBtn" onclick="window.location.href='checkout.html'">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="badge cart-count">0</span>
                </button>
                <button class="icon-btn" id="profileBtn" onclick="window.location.href='profile.html'">
                    <i class="fas fa-user-circle"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Search Overlay -->
    <div class="search-overlay" id="searchOverlay">
        <div class="search-container">
            <div class="search-header">
                <input type="text" class="search-input" placeholder="Search for products, brands..." id="searchInput">
                <button class="icon-btn" id="closeSearch">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="search-results" id="searchResults"></div>
        </div>
    </div>

    <!-- Hero Banner Slider -->
    <section class="hero-slider">
        <div class="slider-container" id="heroSlider">
            <div class="slide active">
                <div class="slide-content">
                    <h2>Festival Sale</h2>
                    <p>Up to 70% Off on Ethnic Wear</p>
                    <button class="btn-primary" onclick="window.location.href='product.html?category=ethnic'">Shop Now</button>
                </div>
            </div>
            <div class="slide">
                <div class="slide-content">
                    <h2>New Arrivals</h2>
                    <p>Fresh Drops Just Landed</p>
                    <button class="btn-primary" onclick="window.location.href='product.html?category=new'">Explore</button>
                </div>
            </div>
            <div class="slide">
                <div class="slide-content">
                    <h2>Premium Collection</h2>
                    <p>Luxury Fashion at Best Prices</p>
                    <button class="btn-primary" onclick="window.location.href='product.html?category=premium'">View Collection</button>
                </div>
            </div>
        </div>
        <div class="slider-dots"></div>
    </section>

    <!-- ========================================== -->
    <!-- ALL PRODUCTS - 2 COLUMN GRID (SABSE UPAR) -->
    <!-- ========================================== -->
    <section class="products-section">
        <div class="section-header">
            <h2 class="section-title">All Products 🛍️</h2>
            <div class="filter-sort">
                <select id="sortFilter" onchange="sortProducts()" class="sort-select">
                    <option value="newest">Newest First</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                    <option value="popular">Most Popular</option>
                    <option value="discount">Biggest Discount</option>
                </select>
            </div>
        </div>
        
        <!-- Filter Pills -->
        <div class="filter-pills" id="categoryPills">
            <button class="pill active" onclick="filterByCategory('all')">All</button>
            <button class="pill" onclick="filterByCategory('ethnic')">Ethnic</button>
            <button class="pill" onclick="filterByCategory('western')">Western</button>
            <button class="pill" onclick="filterByCategory('dresses')">Dresses</button>
            <button class="pill" onclick="filterByCategory('activewear')">Activewear</button>
            <button class="pill" onclick="filterByCategory('footwear')">Footwear</button>
            <button class="pill" onclick="filterByCategory('accessories')">Accessories</button>
        </div>

        <!-- Products Grid (2 Columns) -->
        <div class="products-grid" id="allProducts">
            <!-- Skeleton Loading -->
            <div class="product-card skeleton">
                <div class="product-image skeleton" style="height: 250px;"></div>
                <div class="product-info">
                    <div class="skeleton" style="height: 20px; width: 80%; margin-bottom: 8px;"></div>
                    <div class="skeleton" style="height: 16px; width: 60%;"></div>
                </div>
            </div>
            <div class="product-card skeleton">
                <div class="product-image skeleton" style="height: 250px;"></div>
                <div class="product-info">
                    <div class="skeleton" style="height: 20px; width: 80%; margin-bottom: 8px;"></div>
                    <div class="skeleton" style="height: 16px; width: 60%;"></div>
                </div>
            </div>
            <div class="product-card skeleton">
                <div class="product-image skeleton" style="height: 250px;"></div>
                <div class="product-info">
                    <div class="skeleton" style="height: 20px; width: 80%; margin-bottom: 8px;"></div>
                    <div class="skeleton" style="height: 16px; width: 60%;"></div>
                </div>
            </div>
            <div class="product-card skeleton">
                <div class="product-image skeleton" style="height: 250px;"></div>
                <div class="product-info">
                    <div class="skeleton" style="height: 20px; width: 80%; margin-bottom: 8px;"></div>
                    <div class="skeleton" style="height: 16px; width: 60%;"></div>
                </div>
            </div>
        </div>
        
        <!-- Load More Button -->
        <div style="text-align: center; margin-top: 20px;">
            <button class="btn-outline" id="loadMoreBtn" onclick="loadMoreProducts()" style="display: none;">
                Load More Products
            </button>
        </div>
    </section>

    <!-- ========================================== -->
    <!-- CATEGORIES SECTION (NEECHE) -->
    <!-- ========================================== -->
    <section class="categories-section">
        <h2 class="section-title">Shop by Category</h2>
        <div class="categories-grid" id="categoriesGrid"></div>
    </section>

    <!-- Trending Products -->
    <section class="products-section">
        <div class="section-header">
            <h2 class="section-title">Trending Now 🔥</h2>
            <a href="#" class="view-all" onclick="filterByCategory('all'); window.scrollTo({top: 400, behavior: 'smooth'});">View All</a>
        </div>
        <div class="products-grid" id="trendingProducts"></div>
    </section>

    <!-- Featured Collections -->
    <section class="collections-section">
        <h2 class="section-title">Featured Collections</h2>
        <div class="collections-scroll" id="featuredCollections"></div>
    </section>

    <!-- New Arrivals -->
    <section class="products-section">
        <div class="section-header">
            <h2 class="section-title">New Arrivals ✨</h2>
            <a href="#" class="view-all" onclick="filterByCategory('all'); window.scrollTo({top: 400, behavior: 'smooth'});">View All</a>
        </div>
        <div class="products-grid" id="newArrivals"></div>
    </section>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="#" class="nav-item" id="bottomSearchBtn">
            <i class="fas fa-search"></i>
            <span>Search</span>
        </a>
        <a href="checkout.html" class="nav-item">
            <i class="fas fa-shopping-bag"></i>
            <span>Cart</span>
        </a>
        <a href="profile.html#wishlist" class="nav-item">
            <i class="fas fa-heart"></i>
            <span>Wishlist</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/referral.js"></script>
    <script>
        let currentPage = 1;
        let currentCategory = 'all';
        let currentSort = 'newest';
        const PRODUCTS_PER_PAGE = 10;

        document.addEventListener('DOMContentLoaded', () => {
            loadAllProducts();
            loadCategories();
            loadTrendingProducts();
            loadNewArrivals();
            loadFeaturedCollections();
            initSlider();
            initSearch();
            updateCartCount();
            updateWishlistCount();
            
            // Check referral
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref');
            if (refCode) {
                saveReferral(refCode);
            }
        });

        // Load ALL products from Supabase
        async function loadAllProducts(page = 1, append = false) {
            const container = document.getElementById('allProducts');
            
            if (!append) {
                container.innerHTML = '';
                currentPage = 1;
            }
            
            try {
                let query = supabase
                    .from('products')
                    .select('*', { count: 'exact' });
                
                // Category filter
                if (currentCategory !== 'all') {
                    query = query.eq('category', currentCategory);
                }
                
                // Sorting
                switch(currentSort) {
                    case 'price-low':
                        query = query.order('discounted_price', { ascending: true });
                        break;
                    case 'price-high':
                        query = query.order('discounted_price', { ascending: false });
                        break;
                    case 'popular':
                        query = query.order('popularity', { ascending: false });
                        break;
                    case 'discount':
                        // Calculate discount percentage
                        query = query.order('original_price', { ascending: false });
                        break;
                    default: // newest
                        query = query.order('created_at', { ascending: false });
                }
                
                // Pagination
                const from = (page - 1) * PRODUCTS_PER_PAGE;
                const to = from + PRODUCTS_PER_PAGE - 1;
                query = query.range(from, to);
                
                const { data: products, count, error } = await query;
                
                if (error) throw error;
                
                if (products && products.length > 0) {
                    const productsHTML = products.map(product => `
                        <div class="product-card" onclick="window.location.href='product.html?id=${product.id}'">
                            <div style="position: relative;">
                                <img src="${product.images[0]}" alt="${product.name}" class="product-image" loading="lazy">
                                <div class="product-wishlist" onclick="event.stopPropagation(); toggleWishlistItem(${product.id}, this)">
                                    <i class="far fa-heart"></i>
                                </div>
                                ${product.discounted_price < product.original_price ? 
                                    `<span class="discount-badge" style="position: absolute; top: 10px; left: 10px;">
                                        ${Math.round((1 - product.discounted_price/product.original_price) * 100)}% OFF
                                    </span>` : ''
                                }
                                ${product.stock < 10 && product.stock > 0 ? 
                                    `<span style="position: absolute; bottom: 10px; left: 10px; background: rgba(255,152,0,0.9); color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600;">
                                        Only ${product.stock} left
                                    </span>` : ''
                                }
                                ${product.stock === 0 ? 
                                    `<div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center;">
                                        <span style="background: #f44336; color: white; padding: 8px 16px; border-radius: 8px; font-weight: 700;">OUT OF STOCK</span>
                                    </div>` : ''
                                }
                            </div>
                            <div class="product-info">
                                <h3 class="product-name">${product.name}</h3>
                                <p style="color: var(--text-secondary); font-size: 0.75rem; margin-bottom: 6px;">${product.category}</p>
                                <div class="product-price">
                                    <span class="price-current">₹${product.discounted_price.toLocaleString()}</span>
                                    ${product.discounted_price < product.original_price ? 
                                        `<span class="price-original">₹${product.original_price.toLocaleString()}</span>` : ''
                                    }
                                </div>
                                <div style="display: flex; gap: 4px; margin-top: 6px;">
                                    ${(Array.isArray(product.sizes) ? product.sizes : []).slice(0, 4).map(size => 
                                        `<span style="font-size: 0.65rem; background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px;">${size}</span>`
                                    ).join('')}
                                    ${product.sizes && product.sizes.length > 4 ? 
                                        `<span style="font-size: 0.65rem; color: var(--text-secondary);">+${product.sizes.length - 4}</span>` : ''
                                    }
                                </div>
                                ${product.cod_available ? 
                                    `<p style="color: #4caf50; font-size: 0.7rem; margin-top: 4px;">✓ COD Available</p>` : ''
                                }
                            </div>
                        </div>
                    `).join('');
                    
                    if (append) {
                        container.innerHTML += productsHTML;
                    } else {
                        container.innerHTML = productsHTML;
                    }
                    
                    // Show/hide load more button
                    const loadMoreBtn = document.getElementById('loadMoreBtn');
                    if (count > currentPage * PRODUCTS_PER_PAGE) {
                        loadMoreBtn.style.display = 'inline-block';
                    } else {
                        loadMoreBtn.style.display = 'none';
                    }
                    
                    currentPage = page;
                } else {
                    container.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px;">
                            <i class="fas fa-box-open" style="font-size: 4rem; opacity: 0.2; display: block; margin-bottom: 16px;"></i>
                            <p style="color: var(--text-secondary); font-size: 1.1rem;">No products found</p>
                            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 8px;">Try different category or check back later</p>
                            ${currentCategory !== 'all' ? 
                                `<button class="btn-primary" style="margin-top: 16px;" onclick="filterByCategory('all')">View All Products</button>` : ''
                            }
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading products:', error);
                container.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px;">
                        <p style="color: #f44336;">Failed to load products</p>
                        <button class="btn-primary" style="margin-top: 16px;" onclick="loadAllProducts()">Retry</button>
                    </div>
                `;
            }
        }

        function loadMoreProducts() {
            loadAllProducts(currentPage + 1, true);
        }

        function filterByCategory(category) {
            currentCategory = category;
            
            // Update pills
            document.querySelectorAll('.pill').forEach(pill => {
                pill.classList.remove('active');
                if (pill.textContent.toLowerCase() === category || 
                    (category === 'all' && pill.textContent === 'All')) {
                    pill.classList.add('active');
                }
            });
            
            loadAllProducts();
            
            // Scroll to products
            document.getElementById('allProducts').scrollIntoView({ 
                behavior: 'smooth', 
                block: 'start' 
            });
        }

        function sortProducts() {
            currentSort = document.getElementById('sortFilter').value;
            loadAllProducts();
        }

        // Load Categories (now below products)
        function loadCategories() {
            const categories = [
                { name: 'Ethnic', icon: '👘', id: 'ethnic' },
                { name: 'Western', icon: '👗', id: 'western' },
                { name: 'Dresses', icon: '👚', id: 'dresses' },
                { name: 'Activewear', icon: '🏃‍♀️', id: 'activewear' },
                { name: 'Footwear', icon: '👠', id: 'footwear' },
                { name: 'Accessories', icon: '👜', id: 'accessories' },
                { name: 'Jewelry', icon: '💎', id: 'jewelry' },
                { name: 'Premium', icon: '✨', id: 'premium' }
            ];
            
            const grid = document.getElementById('categoriesGrid');
            if (grid) {
                grid.innerHTML = categories.map(cat => `
                    <div class="category-card" onclick="filterByCategory('${cat.id}')">
                        <div class="category-icon">${cat.icon}</div>
                        <div class="category-name">${cat.name}</div>
                    </div>
                `).join('');
            }
        }

        // Rest of the functions (trending, new arrivals, etc.) remain same...
        async function loadTrendingProducts() {
            const container = document.getElementById('trendingProducts');
            if (!container) return;
            
            try {
                const { data: products } = await supabase
                    .from('products')
                    .select('*')
                    .order('popularity', { ascending: false })
                    .limit(4);
                    
                if (products) {
                    renderProductCards(container, products);
                }
            } catch (error) {
                console.error('Trending error:', error);
            }
        }

        async function loadNewArrivals() {
            const container = document.getElementById('newArrivals');
            if (!container) return;
            
            try {
                const { data: products } = await supabase
                    .from('products')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(4);
                    
                if (products) {
                    renderProductCards(container, products);
                }
            } catch (error) {
                console.error('New arrivals error:', error);
            }
        }

        function renderProductCards(container, products) {
            container.innerHTML = products.map(product => `
                <div class="product-card" onclick="window.location.href='product.html?id=${product.id}'">
                    <div style="position: relative;">
                        <img src="${product.images[0]}" alt="${product.name}" class="product-image" loading="lazy">
                        <div class="product-wishlist" onclick="event.stopPropagation(); toggleWishlistItem(${product.id}, this)">
                            <i class="far fa-heart"></i>
                        </div>
                        ${product.discounted_price < product.original_price ? 
                            `<span class="discount-badge" style="position: absolute; top: 10px; left: 10px;">
                                ${Math.round((1 - product.discounted_price/product.original_price) * 100)}% OFF
                            </span>` : ''
                        }
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">${product.name}</h3>
                        <div class="product-price">
                            <span class="price-current">₹${product.discounted_price.toLocaleString()}</span>
                            ${product.discounted_price < product.original_price ? 
                                `<span class="price-original">₹${product.original_price.toLocaleString()}</span>` : ''
                            }
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Add this CSS in style.css for filter pills
    </script>

    <style>
        /* Filter Pills */
        .filter-pills {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 12px 0;
            scrollbar-width: none;
            -ms-overflow-style: none;
            margin-bottom: 16px;
        }
        
        .filter-pills::-webkit-scrollbar {
            display: none;
        }
        
        .pill {
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .pill:hover {
            background: rgba(216, 27, 96, 0.1);
            border-color: var(--pink-primary);
            color: var(--pink-accent);
        }
        
        .pill.active {
            background: var(--gradient-primary);
            border-color: transparent;
            color: white;
            box-shadow: var(--shadow-pink);
        }
        
        /* Sort Select */
        .sort-select {
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            color: var(--text-primary);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            outline: none;
            font-family: inherit;
        }
        
        .sort-select:focus {
            border-color: var(--pink-primary);
        }
        
        .sort-select option {
            background: #1a1a22;
            color: white;
        }
    </style>
</body>
</html>
